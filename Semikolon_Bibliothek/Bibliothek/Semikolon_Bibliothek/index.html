<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Büchergalerie mit Favoriten</title>
    <!-- CSS-Datei einbinden -->
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <!-- Galerie-Container, der alle Bücher/Bilder enthält -->
    <div class="gallery">
        <!-- Einzelnes Buch/Galerie-Element -->
        <div class="gallery-item" data-id="1">
            <img src="bilder/moodle-buch.jpg" alt="Buch 1">
            <h3>Buch 1</h3>
            <p>Beschreibung von Buch 1.</p>
            <!-- Herz-Button, um ein Buch als Favorit zu markieren -->
            <button class="favorite-btn">
                <span class="heart">🤍</span>
            </button>
        </div>

        <div class="gallery-item" data-id="2">
            <img src="bilder/moodle-buch.jpg" alt="Buch 2">
            <h3>Buch 2</h3>
            <p>Beschreibung von Buch 2.</p>
            <button class="favorite-btn">
                <span class="heart">🤍</span>
            </button>
        </div>

            <img src="bilder/moodle-buch.jpg" alt="Buch 3">

          </button>
        </div>

        </div>

        <div class="gallery-item" data-id="6">

          <button class="favorite-btn">
              <span class="heart">🤍</span>
          </button>
        </div>
    </div>
    <!-- JavaScript-Datei einbinden -->
    <script src="grid.js"></script>
</body>
</html>
